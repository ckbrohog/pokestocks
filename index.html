<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéAlpha Pro — Automated Restock Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=JetBrains+Mono:wght@500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --panel: #11111d; --border: #1f1f35;
  --accent: #e8b84b; --green: #22d47a; --red: #f05050;
  --text: #e0e0f0; --sub: #8080b0;
}

body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px;
}

.container { max-width: 1000px; margin: 0 auto; }

header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px; background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 20px;
}

.status-bar { font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--sub); }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }

.card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 15px; transition: transform 0.2s;
}

.card:hover { border-color: var(--accent); }

.card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }

.badge {
  padding: 4px 8px; border-radius: 4px; font-size: 0.7rem;
  font-weight: bold; text-transform: uppercase;
}

.in-stock { background: rgba(34, 212, 122, 0.2); color: var(--green); }
.out-stock { background: rgba(240, 80, 80, 0.2); color: var(--red); }

.price-group { display: flex; gap: 10px; margin: 10px 0; font-size: 0.9rem; }
.price-box { background: var(--bg); padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); }

button {
  background: var(--accent); color: #000; border: none; padding: 10px 15px;
  border-radius: 6px; cursor: pointer; font-family: 'Syne'; font-weight: 700;
}

.auto-toggle {
  display: flex; align-items: center; gap: 10px; color: var(--sub); font-size: 0.8rem;
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <h1 style="font-family:'Syne'; font-size: 1.5rem; margin-bottom: 5px;">POKÉALPHA <span style="color:var(--accent)">PRO</span></h1>
      <div class="auto-toggle">
        <input type="checkbox" id="autoRefresh" onchange="toggleAuto()"> Enable Auto-Sync (Live)
        <span id="countdown">--</span>
      </div>
    </div>
    <div class="status-bar">
      Last Accurate Sync: <span id="lastSync">Never</span>
    </div>
  </header>

  <div id="trackerGrid" class="grid">
    </div>
</div>

<script>
// Logic Upgrade: Data Objects now include Target URLs and MSRP for accuracy checking
const PRODUCTS = [
  { name: "Evolving Skies BB", msrp: 143.64, url: "https://tcgplayer.com/...", stock: true, lastPrice: 650.00 },
  { name: "Crown Zenith ETB", msrp: 49.99, url: "https://pokemoncenter.com/...", stock: false, lastPrice: 45.00 },
  { name: "151 Booster Bundle", msrp: 26.94, url: "https://target.com/...", stock: false, lastPrice: 26.94 }
];

let refreshTimer;

function renderTracker() {
  const grid = document.getElementById('trackerGrid');
  grid.innerHTML = '';
  
  PRODUCTS.forEach(p => {
    const isOverPriced = p.lastPrice > p.msrp * 1.2; // 20% threshold for "market spike"
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span style="font-weight:600">${p.name}</span>
        <span class="badge ${p.stock ? 'in-stock' : 'out-stock'}">${p.stock ? 'IN STOCK' : 'OOS'}</span>
      </div>
      <div class="price-group">
        <div class="price-box">MSRP: $${p.msrp}</div>
        <div class="price-box" style="color:${isOverPriced ? 'var(--red)' : 'var(--green)'}">
          Market: $${p.lastPrice}
        </div>
      </div>
      <div style="font-size: 0.75rem; color: var(--sub); margin-bottom: 10px;">
        ROI Accuracy: ${((p.msrp / p.lastPrice) * 100).toFixed(1)}%
      </div>
      <button onclick="window.open('${p.url}', '_blank')" style="width:100%">VERIFY SOURCE</button>
    `;
    grid.appendChild(card);
  });
}

// AUTOMATION UPGRADE
async function syncData() {
  console.log("Fetching live accuracy data...");
  // In a real setup, you would fetch from a proxy here:
  // const response = await fetch('YOUR_PROXY_URL');
  
  // Simulating a data update
  document.getElementById('lastSync').textContent = new Date().toLocaleTimeString();
  renderTracker();
}

function toggleAuto() {
  const isEnabled = document.getElementById('autoRefresh').checked;
  if (isEnabled) {
    syncData();
    refreshTimer = setInterval(syncData, 60000); // Sync every minute
  } else {
    clearInterval(refreshTimer);
  }
}

// Initial Run
renderTracker();

</script>
</body>
</html>
