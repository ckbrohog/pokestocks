<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéAlpha — Restock Tracker PRO</title>

<style>
body { background:#0b0b12; color:#fff; font-family:sans-serif; margin:0; padding:20px }
h1 { color:#e8b84b }

/* cards */
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px }
.card {
  border:1px solid #222;
  padding:15px;
  border-radius:10px;
  background:#111;
  transition:.2s;
}
.card:hover { border-color:#444; transform:translateY(-2px) }

.flash {
  animation:flash 1s ease 3;
}
@keyframes flash {
  0%{box-shadow:0 0 0 transparent}
  50%{box-shadow:0 0 25px lime}
  100%{box-shadow:0 0 0 transparent}
}

.btn {
  margin-top:6px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.yes { background:lime; color:black }
.no { background:red; color:white }
.open { background:#e8b84b }

/* stats */
.stats { display:flex; gap:20px; margin-bottom:20px }
.stat { font-size:14px }

</style>
</head>

<body>

<h1>⚡ PokéAlpha PRO</h1>

<div class="stats">
  <div class="stat">Checks: <span id="checks">0</span></div>
  <div class="stat">Hits: <span id="hits">0</span></div>
</div>

<div class="grid" id="grid"></div>

<script>

/* ================= STATE ================= */

const STORES = [
  {id:'bb', name:'Best Buy', alpha:false},
  {id:'target', name:'Target', alpha:false},
  {id:'walmart', name:'Walmart', alpha:false},
  {id:'pc', name:'Pokemon Center', pc:true},
  {id:'kohls', name:"Kohl's", alpha:true},
  {id:'dg', name:'Dollar General', alpha:true},
];

let S = JSON.parse(localStorage.getItem("pokePro")||"{}");

let SESSION = {
  checks:0,
  hits:0
};

/* ================= NOTIFICATIONS ================= */

function askNotificationPermission() {
  if ("Notification" in window) {
    Notification.requestPermission();
  }
}

function notify(title, body) {
  if (Notification.permission === "granted") {
    new Notification(title, {
      body: body,
      icon: "https://upload.wikimedia.org/wikipedia/commons/5/53/Poké_Ball_icon.svg"
    });
  }
}

askNotificationPermission();

/* ================= PRIORITY ================= */

function getScore(id){
  const st = S[id] || {};
  let score = 0;

  if(st.time){
    const mins = (Date.now()-st.time)/60000;
    if(mins<30) score+=3;
    else if(mins<120) score+=2;
    else score+=1;
  }

  const store = STORES.find(s=>s.id===id);
  if(store.alpha) score+=3;
  if(store.pc) score+=4;
  if(st.status==="yes") score+=5;

  return score;
}

/* ================= RENDER ================= */

function render(){
  const grid = document.getElementById("grid");

  const sorted = [...STORES].sort((a,b)=>getScore(b.id)-getScore(a.id));

  grid.innerHTML = sorted.map(s=>{
    const st = S[s.id] || {};
    return `
    <div class="card" id="card-${s.id}">
      <b>${s.name}</b><br>
      Status: ${st.status||"unchecked"}<br>
      <button class="btn open" onclick="openStore('${s.id}')">OPEN</button>
      <button class="btn yes" onclick="mark('${s.id}','yes')">IN STOCK</button>
      <button class="btn no" onclick="mark('${s.id}','no')">OUT</button>
    </div>
    `;
  }).join("");

  document.getElementById("checks").innerText = SESSION.checks;
  document.getElementById("hits").innerText = SESSION.hits;
}

/* ================= ACTIONS ================= */

function openStore(id){
  mark(id,"open");
}

function mark(id,action){
  if(!S[id]) S[id]={};

  S[id].time = Date.now();

  if(action!=="open") S[id].status = action;

  SESSION.checks++;

  if(action==="yes"){
    SESSION.hits++;

    // FLASH
    const el = document.getElementById(`card-${id}`);
    el.classList.add("flash");
    setTimeout(()=>el.classList.remove("flash"),1500);

    // NOTIFICATION
    notify("🔥 RESTOCK FOUND", `${id.toUpperCase()} HAS STOCK`);
  }

  localStorage.setItem("pokePro",JSON.stringify(S));
  render();
}

/* ================= INIT ================= */

render();

</script>

</body>
</html>
